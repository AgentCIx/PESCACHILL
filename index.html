<body class="p-4">

    <div class="main-container max-w-6xl mx-auto">
        <!-- HEADER con botón FINALIZAR DÍA -->
        <header class="header mb-6 flex flex-col md:flex-row justify-between items-end gap-4">
            <div>
                <h1 class="text-3xl font-black text-gold tracking-tight flex items-center gap-2">
                    <span>🐟</span> Black Monastery <span>⚓</span>
                </h1>
                <p class="text-amber-200/70 text-xs">Historial · Finaliza sesión y archiva</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p class="text-[10px] text-amber-300 uppercase tracking-widest mb-1">Profit Neto</p>
                    <p id="main-daily-profit" class="text-3xl md:text-4xl font-black profit-number text-green-400">0</p>
                </div>
                <button onclick="finalizarDia()" class="btn-finalizar text-sm px-6 py-2">📆 FINALIZAR DÍA</button>
            </div>
        </header>

        <!-- Pestañas principales -->
        <div class="tab-container">
            <button id="tab-current-btn" onclick="switchMainTab('current')" class="tab-button tab-active">Sesión Actual</button>
            <button id="tab-daily-btn" onclick="switchMainTab('daily')" class="tab-button">Historial</button>
        </div>

        <!-- Contenido de la pestaña "Sesión Actual" -->
        <div id="current-session-tab" class="block space-y-5">
            <!-- Fila superior: 3 columnas iguales -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <!-- Configuración -->
                <div class="card p-5">
                    <h2 class="text-lg border-b border-amber-700 pb-2 mb-3 flex items-center gap-2">⚙️ CONFIGURACIÓN</h2>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-[10px] text-amber-400 uppercase mb-1">Valor del Set (M)</label>
                            <input type="text" id="gear-value-fixed" value="0m" placeholder="ej: 7.5m" class="input-field w-full" onchange="saveSettings()">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="block text-[10px] text-amber-400 uppercase mb-1">DIARIO VACIO (k)</label>
                                <input type="text" id="cost-journal" value="50k" placeholder="ej: 50k" class="input-field w-full" onchange="saveSettings()">
                            </div>
                            <div>
                                <label class="block text-[10px] text-amber-400 uppercase mb-1">Consumibles (k)</label>
                                <input type="text" id="cost-supplies" value="40k" placeholder="ej: 40k" class="input-field w-full" onchange="saveSettings()">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Profit/round -->
                <div class="card p-5 border-emerald-700">
                    <h2 class="text-lg border-b border-emerald-700 pb-2 mb-3 flex items-center gap-2">💰 PROFIT/ROUND</h2>
                    <div class="space-y-3">
                        <input type="text" id="run-loot" value="0m" placeholder="Botín (M) ej: 1.2m" class="input-field w-full" onchange="formatBotin()">
                        <input type="number" id="run-journals" placeholder="Diario Full (cantidad)" class="input-field w-full">
                        <button onclick="registrarVuelta(false)" class="btn-success w-full">REGISTRAR PROFIT</button>
                    </div>
                </div>

                <!-- Registrar muerte -->
                <div class="card p-5 border-red-700">
                    <h2 class="text-lg border-b border-red-700 pb-2 mb-3 flex items-center gap-2">💀 REGISTRAR MUERTE</h2>
                    <div class="space-y-3">
                        <input type="number" id="death-journals" placeholder="Libros perdidos (cantidad)" class="input-field w-full">
                        <button onclick="registrarVuelta(true)" class="btn-danger w-full">REGISTRAR MUERTE</button>
                    </div>
                </div>
            </div>

            <!-- Fila inferior: IA (1/3) + Tabla registros (2/3) -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <!-- Consultar a la IA -->
                <div class="card p-5 bg-blue-900/20 border-blue-700 md:col-span-1">
                    <h2 class="text-lg border-b border-blue-700 pb-2 mb-3 flex items-center gap-2">🧠 CONSULTAR IA</h2>
                    <div class="space-y-2">
                        <button onclick="askGemini('Analiza mis datos...')" class="btn-ai w-full text-sm">ANALIZAR ESTRATEGIA</button>
                        <button onclick="askGemini('Predice mi riesgo...')" class="btn-ai w-full text-sm bg-slate-700 border-slate-500">PREDECIR RIESGO</button>
                        <div id="ai-response-container" class="hidden mt-3 p-3 bg-black/50 rounded-lg border border-blue-500/30 text-xs">
                            <div id="ai-loader" class="flex justify-center py-1">
                                <span class="animate-bounce text-lg">🔮</span> Procesando...
                            </div>
                            <p id="ai-text" class="whitespace-pre-wrap text-xs"></p>
                        </div>
                    </div>
                </div>

                <!-- Tabla de registros -->
                <div class="md:col-span-2 card p-5">
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="text-lg flex items-center gap-2">📋 REGISTROS</h2>
                        <button onclick="reiniciarSesion()" class="bg-red-900/50 text-white px-3 py-1 rounded-full text-xs border border-red-700 hover:bg-red-800/50">
                            Resetear
                        </button>
                    </div>
                    <div class="grid grid-cols-3 gap-2 mb-4">
                        <div class="stat-box-small">
                            <p class="text-[9px] text-amber-400 uppercase">Vueltas</p>
                            <p id="runs-count" class="text-xl font-bold text-white">0</p>
                        </div>
                        <div class="stat-box-small">
                            <p class="text-[9px] text-red-400 uppercase">Muertes</p>
                            <p id="deaths-count" class="text-xl font-bold text-red-400">0</p>
                        </div>
                        <div class="stat-box-small">
                            <p class="text-[9px] text-blue-400 uppercase">Promedio</p>
                            <p id="avg-profit" class="text-xl font-bold text-blue-400">0</p>
                        </div>
                    </div>
                    <div class="overflow-x-auto max-h-80 overflow-y-auto">
                        <table>
                            <thead>
                                <tr>
                                    <th class="px-3 py-2">#</th>
                                    <th class="px-3 py-2 text-right">Botín</th>
                                    <th class="px-3 py-2 text-right">Diario Full</th>
                                    <th class="px-3 py-2 text-center">Estado</th>
                                    <th class="px-3 py-2 text-right">Neto</th>
                                </tr>
                            </thead>
                            <tbody id="history-list"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Contenido de la pestaña "Historial" -->
        <div id="daily-history-tab" class="hidden">
            <div class="card p-6">
                <!-- Vista de lista de días -->
                <div id="day-list-view" class="block">
                    <h2 class="text-xl mb-4 flex items-center gap-2">📁 REGISTROS</h2>
                    <div id="day-list-container" class="day-list"></div>
                </div>

                <!-- Vista de detalle de un día -->
                <div id="day-detail-view" class="hidden">
                    <div class="flex items-center gap-3 mb-4">
                        <button onclick="showDayList()" class="btn-back">← Volver</button>
                        <h2 id="selected-day-title" class="text-lg text-gold"></h2>
                    </div>
                    <div id="daily-detail-table" class="overflow-x-auto max-h-96 overflow-y-auto"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ---------- CONFIGURACIÓN ----------
        const apiKey = "AIzaSyC5LFTVpbM9D_WuCmt6hPpWgRj5Fk0h5Xc";

        // Estado global
        let sessionData = { totalProfit: 0, runs: 0, deaths: 0, history: [] };
        let dailyHistory = [];
        let selectedDayIndex = -1;
        let currentMainTab = 'current';
        let showingDetail = false;

        // ---------- FUNCIÓN DE PARSEO CON UNIDAD POR DEFECTO ----------
        function parseWithUnit(value, defaultUnit = '') {
            if (value === undefined || value === null || value === '') return 0;
            let clean = String(value).toLowerCase().replace(/,/g, '').trim();
            if (clean === '') return 0;
            let factor = 1;
            if (clean.endsWith('k')) {
                factor = 1000;
                clean = clean.slice(0, -1);
            } else if (clean.endsWith('m')) {
                factor = 1000000;
                clean = clean.slice(0, -1);
            } else if (defaultUnit === 'k') {
                factor = 1000;
            } else if (defaultUnit === 'm') {
                factor = 1000000;
            }
            let num = parseFloat(clean);
            if (isNaN(num)) num = 0;
            return num * factor;
        }

        // Formatear un número con sufijo (k o m)
        function formatWithUnit(value, unit) {
            if (value === 0) return '0' + unit;
            if (unit === 'm') {
                let val = value / 1000000;
                return val % 1 === 0 ? val.toFixed(0) + 'm' : val.toFixed(1) + 'm';
            } else if (unit === 'k') {
                let val = value / 1000;
                return val % 1 === 0 ? val.toFixed(0) + 'k' : val.toFixed(1) + 'k';
            }
            return value.toString();
        }

        function format(n) {
            const abs = Math.abs(n);
            const sign = n < 0 ? '-' : '';
            if (abs >= 1000000) return sign + (abs / 1000000).toFixed(2) + 'M';
            if (abs >= 1000) return sign + (abs / 1000).toFixed(1) + 'K';
            return sign + Math.floor(abs).toLocaleString();
        }

        // ---------- FUNCIÓN PARA FORMATEAR EL CAMPO BOTÍN ----------
        function formatBotin() {
            const input = document.getElementById('run-loot');
            const valor = parseWithUnit(input.value, 'm');
            input.value = formatWithUnit(valor, 'm');
        }

        // ---------- GEMINI AI ----------
        async function askGemini(prompt) {
            const container = document.getElementById('ai-response-container');
            const textEl = document.getElementById('ai-text');
            const loader = document.getElementById('ai-loader');
            container.classList.remove('hidden');
            textEl.innerText = "";
            loader.classList.remove('hidden');

            const gear = parseWithUnit(document.getElementById('gear-value-fixed').value, 'm');
            const journalCost = parseWithUnit(document.getElementById('cost-journal').value, 'k');
            const supplies = parseWithUnit(document.getElementById('cost-supplies').value, 'k');

            const context = `Contexto: Soy un pescador de Albion Online (Tier 8). Configuración actual: Set(${format(gear)}), Diarios(${format(journalCost)}), Consumibles(${format(supplies)}). Resumen Sesión: Profit Neto(${format(sessionData.totalProfit)}), Vueltas(${sessionData.runs}), Muertes(${sessionData.deaths}). Historial reciente: ${JSON.stringify(sessionData.history.slice(0,5))} Pregunta del usuario: ${prompt} Responde de forma breve y concisa, como un veterano del juego.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: context }] }] })
                });
                if (!response.ok) throw new Error('Network error');
                const data = await response.json();
                loader.classList.add('hidden');
                textEl.innerText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Sin respuesta";
            } catch (error) {
                loader.classList.add('hidden');
                textEl.innerText = "Error al conectar con la IA.";
            }
        }

        // ---------- REGISTRO DE VUELTA ----------
        function registrarVuelta(esMuerte) {
            const gear = parseWithUnit(document.getElementById('gear-value-fixed').value, 'm');
            const journalCost = parseWithUnit(document.getElementById('cost-journal').value, 'k');
            const supplies = parseWithUnit(document.getElementById('cost-supplies').value, 'k');
            
            let loot = 0, journals = 0, neto = 0;

            if (esMuerte) {
                journals = parseInt(document.getElementById('death-journals').value, 10);
                if (isNaN(journals)) journals = 0;
                neto = -(gear + supplies + (journals * journalCost));
                sessionData.deaths++;
            } else {
                loot = parseWithUnit(document.getElementById('run-loot').value, 'm');
                journals = parseInt(document.getElementById('run-journals').value, 10);
                if (isNaN(journals)) journals = 0;
                neto = loot - supplies - (journals * journalCost);
            }

            sessionData.totalProfit += neto;
            sessionData.runs++;
            sessionData.history.unshift({
                id: sessionData.runs,
                muerte: esMuerte,
                loot,
                diarios: journals,
                neto,
                timestamp: new Date().toLocaleTimeString()
            });

            document.getElementById('run-loot').value = '0m';
            document.getElementById('run-journals').value = "";
            document.getElementById('death-journals').value = "";
            
            saveToStorage();
            renderAll();
        }

        // ---------- FINALIZAR DÍA ----------
        function finalizarDia() {
            if (sessionData.runs === 0) { alert("No hay vueltas en la sesión actual."); return; }
            const fecha = new Date().toLocaleDateString('es-ES').replace(/\//g, '-');
            dailyHistory.push({ date: fecha, runs: sessionData.history.slice() });
            selectedDayIndex = dailyHistory.length - 1;
            sessionData = { totalProfit: 0, runs: 0, deaths: 0, history: [] };
            saveToStorage();
            switchMainTab('daily');
            showDayList();
            renderAll();
        }

        // ---------- ELIMINAR UN DÍA ----------
        function deleteDay(index) {
            if (confirm(`¿Eliminar el día ${formatDateForDisplay(dailyHistory[index].date)}?`)) {
                dailyHistory.splice(index, 1);
                if (showingDetail && selectedDayIndex === index) showDayList();
                else if (selectedDayIndex > index) selectedDayIndex--;
                else if (selectedDayIndex === index) selectedDayIndex = -1;
                if (dailyHistory.length === 0) showDayList();
                saveToStorage();
                renderAll();
            }
        }

        function formatDateForDisplay(dateStr) {
            const parts = dateStr.split('-');
            if (parts.length === 3) {
                return `${parts[0]}/${parts[1]}`;
            }
            return dateStr;
        }

        // ---------- RENDERIZADO ----------
        function renderAll() {
            document.getElementById('main-daily-profit').innerText = format(sessionData.totalProfit);
            document.getElementById('runs-count').innerText = sessionData.runs;
            document.getElementById('deaths-count').innerText = sessionData.deaths;
            const avg = sessionData.runs > 0 ? sessionData.totalProfit / sessionData.runs : 0;
            document.getElementById('avg-profit').innerText = format(avg);
            renderCurrentSession();
            if (showingDetail) renderDayDetail(); else renderDayList();
        }

        function renderCurrentSession() {
            const list = document.getElementById('history-list');
            list.innerHTML = sessionData.history.map(item => `
                <tr class="${item.muerte ? 'row-death' : ''}">
                    <td class="px-3 py-2 text-center font-mono">${item.id}</td>
                    <td class="text-right font-bold text-amber-200">${item.muerte ? '---' : format(item.loot)}</td>
                    <td class="text-right text-amber-200">${item.muerte ? '-'+item.diarios : item.diarios}</td>
                    <td class="text-center">
                        <span class="px-2 py-1 rounded-full text-[9px] font-bold border ${item.muerte ? 'border-red-500 text-red-300 bg-red-900/30' : 'border-green-500 text-green-300 bg-green-900/30'}">
                            ${item.muerte ? 'MUERTE' : 'ÉXITO'}
                        </span>
                    </td>
                    <td class="text-right font-black ${item.neto >= 0 ? 'text-green-400' : 'text-red-400'}">${format(item.neto)}</td>
                </tr>
            `).join('');
        }

        function renderDayList() {
            const container = document.getElementById('day-list-container');
            if (!container) return;
            if (dailyHistory.length === 0) { container.innerHTML = '<p class="text-amber-300/50">No hay días archivados.</p>'; return; }
            let html = '';
            dailyHistory.forEach((day, i) => {
                const total = day.runs.reduce((a, r) => a + r.neto, 0);
                const deaths = day.runs.filter(r => r.muerte).length;
                const short = formatDateForDisplay(day.date);
                // El summary ahora tiene clase font-mono para mejor legibilidad del punto decimal
                html += `<div class="day-list-item" onclick="openDayDetail(${i})">
                    <span class="date">${short}</span>
                    <div class="flex items-center gap-3">
                        <span class="summary font-mono">${format(total)} · 💀${deaths}</span>
                        <button class="btn-delete" onclick="event.stopPropagation(); deleteDay(${i})" title="Eliminar">🗑️</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function openDayDetail(index) {
            selectedDayIndex = index;
            showingDetail = true;
            renderDayDetail();
            document.getElementById('day-list-view').classList.add('hidden');
            document.getElementById('day-detail-view').classList.remove('hidden');
        }

        function showDayList() {
            showingDetail = false;
            document.getElementById('day-list-view').classList.remove('hidden');
            document.getElementById('day-detail-view').classList.add('hidden');
            renderDayList();
        }

        function renderDayDetail() {
            if (selectedDayIndex < 0) return;
            const day = dailyHistory[selectedDayIndex];
            document.getElementById('selected-day-title').innerText = `Detalles del ${formatDateForDisplay(day.date)}`;
            let rows = '';
            day.runs.forEach((item, idx) => {
                rows += `<tr class="${item.muerte ? 'row-death' : ''}">
                    <td class="px-3 py-2 text-center font-mono">${idx+1}</td>
                    <td class="text-right font-bold text-amber-200">${item.muerte ? '---' : format(item.loot)}</td>
                    <td class="text-right text-amber-200">${item.muerte ? '-'+item.diarios : item.diarios}</td>
                    <td class="text-center">
                        <span class="px-2 py-1 rounded-full text-[9px] font-bold border ${item.muerte ? 'border-red-500 text-red-300 bg-red-900/30' : 'border-green-500 text-green-300 bg-green-900/30'}">
                            ${item.muerte ? 'MUERTE' : 'ÉXITO'}
                        </span>
                    </td>
                    <td class="text-right font-black ${item.neto >= 0 ? 'text-green-400' : 'text-red-400'}">${format(item.neto)}</td>
                </tr>`;
            });
            document.getElementById('daily-detail-table').innerHTML = `<table><thead><tr><th>#</th><th>Botín</th><th>Diario Full</th><th>Estado</th><th>Neto</th></tr></thead><tbody>${rows}</tbody></table>`;
        }

        function switchMainTab(tab) {
            currentMainTab = tab;
            const currentTab = document.getElementById('current-session-tab');
            const dailyTab = document.getElementById('daily-history-tab');
            const btnCurrent = document.getElementById('tab-current-btn');
            const btnDaily = document.getElementById('tab-daily-btn');
            if (tab === 'current') {
                currentTab.classList.remove('hidden');
                dailyTab.classList.add('hidden');
                btnCurrent.classList.add('tab-active');
                btnDaily.classList.remove('tab-active');
            } else {
                currentTab.classList.add('hidden');
                dailyTab.classList.remove('hidden');
                btnCurrent.classList.remove('tab-active');
                btnDaily.classList.add('tab-active');
                showDayList();
            }
        }

        function reiniciarSesion() {
            if (confirm("¿Borrar la sesión actual? (El historial no se borrará)")) {
                try {
                    sessionData = { totalProfit: 0, runs: 0, deaths: 0, history: [] };
                    saveToStorage();
                    renderAll();
                    
                    const gearInput = document.getElementById('gear-value-fixed');
                    const journalInput = document.getElementById('cost-journal');
                    const suppliesInput = document.getElementById('cost-supplies');
                    
                    if (gearInput) {
                        gearInput.removeAttribute('disabled');
                        gearInput.removeAttribute('readonly');
                    }
                    if (journalInput) {
                        journalInput.removeAttribute('disabled');
                        journalInput.removeAttribute('readonly');
                    }
                    if (suppliesInput) {
                        suppliesInput.removeAttribute('disabled');
                        suppliesInput.removeAttribute('readonly');
                    }
                    
                    setTimeout(() => {
                        if (gearInput) gearInput.focus();
                    }, 100);
                } catch (e) {
                    console.error('Error en reiniciarSesion:', e);
                    alert('Ocurrió un error al resetear. Por favor, recarga la página.');
                }
            }
        }

        function saveSettings() {
            try {
                const gearVal = parseWithUnit(document.getElementById('gear-value-fixed').value, 'm');
                const journalVal = parseWithUnit(document.getElementById('cost-journal').value, 'k');
                const suppliesVal = parseWithUnit(document.getElementById('cost-supplies').value, 'k');

                const config = {
                    gear: gearVal,
                    journal: journalVal,
                    supplies: suppliesVal
                };
                localStorage.setItem('albion_fishing_config', JSON.stringify(config));

                document.getElementById('gear-value-fixed').value = formatWithUnit(gearVal, 'm');
                document.getElementById('cost-journal').value = formatWithUnit(journalVal, 'k');
                document.getElementById('cost-supplies').value = formatWithUnit(suppliesVal, 'k');
            } catch (e) {
                console.error('Error al guardar configuración:', e);
            }
        }

        function saveToStorage() {
            try {
                localStorage.setItem('albion_fishing_data', JSON.stringify(sessionData));
                localStorage.setItem('albion_daily_history', JSON.stringify(dailyHistory));
            } catch (e) {
                console.error('Error al guardar en localStorage:', e);
            }
        }

        window.onload = () => {
            try {
                const savedConfig = localStorage.getItem('albion_fishing_config');
                if (savedConfig) {
                    const config = JSON.parse(savedConfig);
                    document.getElementById('gear-value-fixed').value = formatWithUnit(config.gear || 0, 'm');
                    document.getElementById('cost-journal').value = formatWithUnit(config.journal || 50000, 'k');
                    document.getElementById('cost-supplies').value = formatWithUnit(config.supplies || 40000, 'k');
                } else {
                    document.getElementById('gear-value-fixed').value = '0m';
                    document.getElementById('cost-journal').value = '50k';
                    document.getElementById('cost-supplies').value = '40k';
                }

                document.getElementById('run-loot').value = '0m';

                const savedSession = localStorage.getItem('albion_fishing_data');
                if (savedSession) {
                    try { sessionData = JSON.parse(savedSession); } catch (e) { sessionData = { totalProfit:0, runs:0, deaths:0, history:[] }; }
                }
                const savedDaily = localStorage.getItem('albion_daily_history');
                if (savedDaily) {
                    try { 
                        dailyHistory = JSON.parse(savedDaily);
                        if (dailyHistory.length > 0) selectedDayIndex = dailyHistory.length - 1;
                    } catch (e) { dailyHistory = []; }
                }
                renderAll();
                switchMainTab('current');
            } catch (e) {
                console.error('Error en inicialización:', e);
                alert('Hubo un problema al cargar la aplicación. Recarga la página.');
            }
        };
    </script>
</body>
</html>
